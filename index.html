<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동 플래너">
<title>운동 플래너</title>
<style>
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--surface3:#2a2a38;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f4;--muted:#7070a0;--muted2:#9090b8;
  --accent:#7c6af7;--accent2:#a78bfa;--accent-bg:rgba(124,106,247,0.15);
  --green:#34d399;--green-bg:rgba(52,211,153,0.15);
  --orange:#fb923c;--red:#f87171;--yellow:#fbbf24;
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text)}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;overflow-x:hidden}

/* ══ 페이지 시스템 ══ */
.page{display:none;min-height:100dvh;flex-direction:column}
.page.active{display:flex}

/* ══ 탭바 ══ */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(26,26,34,0.97);border-top:1px solid var(--border);padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;touch-action:manipulation;border:none;background:none}
.tab-icon{font-size:20px;transition:transform 0.15s}
.tab-label{font-size:9px;font-weight:600;color:var(--muted)}
.tab-btn.active .tab-icon{transform:scale(1.15)}
.tab-btn.active .tab-label{color:var(--accent2)}

/* ══ 공통 헤더 ══ */
.page-header{padding:52px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px}

/* ══ 섹션 타이틀 ══ */
.sec-hd{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px}
.sec-hd:first-child{margin-top:4px}

/* ══ 스크롤 가능한 칩 ══ */
.chip-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;touch-action:manipulation;white-space:nowrap;-webkit-appearance:none}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ══ 검색 ══ */
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;padding:10px 12px 10px 36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-size:14px;color:var(--text);-webkit-appearance:none;outline:none}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(124,106,247,0.4)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}

/* ══ 이번 주 미니 ══ */
.week-row{display:flex;gap:5px;margin-bottom:4px}
.week-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wd-label{font-size:9px;color:var(--muted);font-weight:600}
.wd-dot{width:34px;height:34px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted)}
.wd-dot.done{background:var(--green-bg);color:var(--green)}
.wd-dot.today{border:2px solid var(--accent);color:var(--accent2)}
.wd-dot.done.today{background:var(--green-bg);border-color:var(--green);color:var(--green)}

/* ══ 홈 - 루틴 카드 ══ */
.routine-cards{display:flex;flex-direction:column;gap:8px}
.r-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.r-card:active{transform:scale(0.98);opacity:0.85}
.r-icon{width:46px;height:46px;border-radius:12px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.r-body{flex:1;min-width:0}
.r-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:6px}
.r-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--muted2)}
.tag-accent{background:var(--accent-bg);color:var(--accent2)}
.tag-green{background:var(--green-bg);color:var(--green)}
.r-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.r-start-btn{padding:7px 12px;border-radius:var(--radius-xs);background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.r-edit-btn{padding:5px 10px;border-radius:var(--radius-xs);background:var(--surface2);border:none;color:var(--muted2);font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;text-align:center}
.r-del-btn{padding:5px 10px;border-radius:var(--radius-xs);background:rgba(248,113,113,0.1);border:none;color:var(--red);font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;text-align:center}

/* ══ 빈 상태 ══ */
.empty-state{text-align:center;padding:48px 24px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--muted);line-height:1.6}

/* ══ FAB (새 루틴 버튼) ══ */
.fab{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:24px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,106,247,0.4);z-index:50}

/* ══ 라이브러리 카드 ══ */
.lib-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s}
.lib-card.in-routine{border-color:rgba(124,106,247,0.35)}
.lib-info{flex:1;min-width:0}
.lib-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.lib-cat{font-size:10px;color:var(--muted);margin-top:1px}
.lib-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.yt-btn{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:99px;background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.25);text-decoration:none;touch-action:manipulation;cursor:pointer}
.yt-text{font-size:9px;font-weight:700;color:var(--red);white-space:nowrap}
.lib-add-btn{width:30px;height:30px;border-radius:50%;border:none;font-size:16px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;transition:all 0.2s}
.lib-add-btn.can-add{background:var(--accent);color:#fff}
.lib-add-btn.added{background:var(--green-bg);color:var(--green)}
.lib-add-btn.no-routine{background:var(--surface2);color:var(--muted)}
.lib-del-btn{width:26px;height:26px;border-radius:50%;background:rgba(248,113,113,0.1);border:none;color:var(--red);font-size:12px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ══ 직접 추가 ══ */
.add-custom-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px}
.add-custom-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.add-custom-row{display:flex;gap:8px}
.add-custom-input{flex:1;padding:9px 11px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface2);font-size:14px;color:var(--text);-webkit-appearance:none;outline:none}
.add-custom-input::placeholder{color:var(--muted)}
.add-custom-input:focus{border-color:rgba(124,106,247,0.4)}
.add-custom-cat{width:90px;padding:9px 8px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface2);font-size:12px;color:var(--muted2);-webkit-appearance:none;outline:none}
.add-custom-btn{padding:9px 14px;border-radius:var(--radius-xs);background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap}

/* ══ 패널 (슬라이드업) ══ */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none}
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-radius:20px 20px 0 0;z-index:210;max-height:92dvh;display:none;flex-direction:column}
.panel-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:99px;margin:12px auto 14px}
.panel-hd{padding:0 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:10px}
.panel-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:14px 20px 10px}
.panel-footer{padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);flex-shrink:0}
.panel-input{width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);font-size:15px;color:var(--text);margin-bottom:0;-webkit-appearance:none;outline:none}
.panel-input::placeholder{color:var(--muted)}
.panel-input:focus{border-color:rgba(124,106,247,0.4)}

/* ══ 빌더 내 선택된 운동 카드 ══ */
.sel-card{background:var(--surface2);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px;border:1px solid transparent;transition:border-color 0.2s}
.sel-card-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sel-num{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;width:16px}
.sel-name{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0}
.sel-move-btns{display:flex;gap:4px}
.sel-move-btn{width:22px;height:22px;border-radius:50%;background:var(--surface3);border:none;color:var(--muted2);font-size:11px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
.sel-del-btn{width:22px;height:22px;border-radius:50%;background:rgba(248,113,113,0.12);border:none;color:var(--red);font-size:12px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
.sel-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ctrl-block{background:var(--surface3);border-radius:var(--radius-xs);padding:8px 10px}
.ctrl-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.ctrl-row{display:flex;align-items:center;gap:6px}
.ctrl-btn{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ctrl-val{font-size:16px;font-weight:700;color:var(--text);min-width:22px;text-align:center;flex:1}
.ctrl-unit{font-size:10px;color:var(--muted);flex-shrink:0}
.type-row{display:flex;gap:4px;margin-top:6px}
.type-chip{flex:1;padding:4px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;touch-action:manipulation;text-align:center}
.type-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ══ 저장 버튼 ══ */
.save-btn{width:100%;padding:13px;border-radius:var(--radius-sm);background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation}
.save-btn:disabled{opacity:0.3}

/* ══ 운동 화면 ══ */
#page-workout{background:var(--bg);padding-bottom:90px}
.wo-header{padding:52px 20px 12px;position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);z-index:10}
.wo-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.back-btn{width:34px;height:34px;border-radius:10px;background:var(--surface);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.wo-name{font-size:17px;font-weight:700;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wo-prog-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.wo-prog-fill{height:100%;border-radius:99px;background:var(--accent);transition:width 0.3s}
.wo-body{padding:14px 20px}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:border-color 0.2s}
.ex-card.ex-done{border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.04)}
.ex-top{display:flex;align-items:flex-start;gap:10px}
.ex-chk{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation;transition:all 0.2s;min-width:28px;min-height:28px}
.ex-chk.chk-done{background:var(--green);border-color:var(--green)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:2px}
.ex-meta-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.ex-meta-txt{font-size:12px;color:rgba(255,255,255,0.55)}
.set-dots{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.set-dot{width:38px;height:38px;border-radius:50%;border:2px solid var(--border2);font-size:12px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;background:var(--surface2);transition:all 0.2s;min-width:38px;min-height:38px}
.set-dot.sd-done{background:var(--accent);border-color:var(--accent);color:#fff}

/* 완료 바 */
.fin-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(26,26,34,0.97);border-top:1px solid var(--border);padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50;backdrop-filter:blur(20px)}
.fin-stat{text-align:center}
.fin-num{font-size:16px;font-weight:700;color:var(--text)}
.fin-label{font-size:9px;color:var(--muted);margin-top:1px}
.fin-close{padding:11px 14px;border-radius:99px;background:var(--surface2);border:none;color:var(--muted2);font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.fin-btn{padding:11px 20px;border-radius:99px;background:var(--accent);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation}
.fin-btn:disabled{opacity:0.3}
.fin-btn.done-state{background:var(--green);color:#000}

/* ══ 히스토리 ══ */
#page-history{background:var(--bg);padding:0 0 100px}
.hist-header{padding:58px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.hist-body{padding:16px 20px}
.month-label{font-size:12px;font-weight:700;color:var(--muted);margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.cal-day-hd{font-size:9px;font-weight:700;color:var(--muted);text-align:center;padding:3px 0}
.cal-cell{aspect-ratio:1;border-radius:var(--radius-xs);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;cursor:default}
.cal-cell.has-log{background:var(--green-bg);cursor:pointer}
.cal-cell.has-log .cal-num{color:var(--green)}
.cal-cell.is-today{border:1px solid var(--accent)}
.cal-cell.is-today .cal-num{color:var(--accent2)}
.cal-cell.empty{background:transparent}
.cal-num{font-size:11px;font-weight:600;color:var(--muted)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--green);margin-top:1px}
.hist-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.he-date{font-size:11px;color:var(--muted);margin-bottom:4px}
.he-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.he-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.he-exlist{font-size:12px;color:var(--muted2);line-height:1.7}
.he-stats{display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.he-stat{text-align:center}
.he-stat-num{font-size:14px;font-weight:700;color:var(--text)}
.he-stat-label{font-size:9px;color:var(--muted);margin-top:1px}

/* ══ 타이머 ══ */
.timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;display:flex;align-items:center;justify-content:center}
.timer-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 28px 24px;text-align:center;width:260px;max-width:90vw}
.timer-label{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
.timer-num{font-size:52px;font-weight:700;color:var(--accent2);margin-bottom:20px;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.timer-row{display:flex;gap:8px}
.t-btn{flex:1;padding:11px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation}
.t-stop{background:var(--accent);color:#fff}
.t-cancel{background:var(--surface2);color:var(--muted2)}

/* ══ 토스트 ══ */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(240,240,244,0.95);color:#1c1c1e;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:500;white-space:nowrap;transition:opacity 0.3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.3)}

/* ══ 애니메이션 ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.r-card{animation:fadeUp 0.2s ease both}

/* ══ 주간 근육군 대시보드 ══ */
.muscle-dashboard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.md-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.md-title{font-size:15px;font-weight:700;color:var(--text)}
.md-week{font-size:11px;color:var(--muted);font-weight:500}
.md-goal-note{font-size:11px;color:var(--muted2);margin-bottom:12px;line-height:1.4}
.mg-row{margin-bottom:10px}
.mg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.mg-name{font-size:13px;font-weight:600;color:var(--text)}
.mg-count{font-size:12px;font-weight:700}
.mg-count.mg-ok{color:var(--green)}
.mg-count.mg-low{color:var(--orange)}
.mg-count.mg-none{color:var(--muted)}
.mg-bar-wrap{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.mg-bar-fill{height:6px;border-radius:99px;transition:width 0.4s}
.mg-bar-fill.mf-ok{background:var(--green)}
.mg-bar-fill.mf-mid{background:var(--yellow)}
.mg-bar-fill.mf-low{background:var(--orange)}
.mg-bar-fill.mf-none{background:var(--surface3);width:4px!important}
.mg-alert-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.mg-alert-chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:rgba(251,146,60,0.12);color:var(--orange);border:1px solid rgba(251,146,60,0.25)}
.md-week-nav{display:flex;align-items:center;gap:8px}
.wn-btn{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;color:var(--muted2);font-size:14px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
.muscle-tag-panel{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px}
.mtp-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.mtp-chips{display:flex;gap:6px;flex-wrap:wrap}
.mtp-chip{padding:5px 11px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:600;color:var(--muted2);cursor:pointer;touch-action:manipulation}
.mtp-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.hist-tab-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px}
.hist-tab{flex:1;padding:9px 4px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;touch-action:manipulation;border-bottom:2px solid transparent;margin-bottom:-1px}
.hist-tab.ht-active{color:var(--text);font-weight:700;border-bottom-color:var(--accent)}

/* ══ 운동 중 인라인 편집 ══ */
.wo-edit-bar{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.wo-adj-btn{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);font-size:14px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wo-adj-val{font-size:13px;font-weight:700;color:var(--text);min-width:18px;text-align:center}
.wo-adj-label{font-size:10px;color:var(--muted);margin-right:4px}
.wo-del-btn{margin-left:auto;padding:4px 9px;border-radius:99px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--red);font-size:10px;font-weight:600;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.wo-add-bar{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.wo-add-input{flex:1;padding:8px 10px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface2);font-size:13px;color:var(--text);-webkit-appearance:none;outline:none}
.wo-add-input::placeholder{color:var(--muted)}
.wo-add-btn{padding:8px 12px;border-radius:var(--radius-xs);background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.wo-add-btn-icon{width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.save-partial-btn{padding:11px 14px;border-radius:99px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.save-partial-btn:active{background:var(--surface3)}

<body>

<!-- 타이머 -->
<div id="timer-overlay" class="timer-overlay" style="display:none">
  <div class="timer-box">
    <div class="timer-label">세트 사이 휴식</div>
    <div class="timer-num" id="timer-num">0:00</div>
    <div class="timer-row">
      <button class="t-btn t-stop" onclick="stopTimer()">휴식 종료</button>
      <button class="t-btn t-cancel" onclick="cancelTimer()">닫기</button>
    </div>
  </div>
</div>

<!-- 루틴 빌더 패널 -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel" id="builder-panel">
  <div class="panel-handle"></div>
  <div class="panel-hd">
    <div class="panel-title" id="panel-title">새 루틴 만들기</div>
    <input class="panel-input" id="routine-name-input" placeholder="루틴 이름 (예: 월요일 상체)" maxlength="30">
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-footer">
    <button class="save-btn" id="save-btn" onclick="saveRoutine()">루틴 저장</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast" style="opacity:0"></div>

<!-- ════ 홈 페이지 ════ -->
<div class="page active" id="page-home">
  <div class="page-header">
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div style="font-size:13px;font-weight:500;color:var(--muted);margin-bottom:3px" id="hd-date">오늘</div>
        <div class="page-title">내 루틴</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-top:4px">
        <div style="background:var(--accent-bg);border:1px solid rgba(124,106,247,0.3);border-radius:99px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--accent2)" id="streak-badge">🔥 0일 연속</div>
      </div>
    </div>
  </div>
  <div style="padding:14px 20px;flex:1;padding-bottom:100px">
    <div class="sec-hd">이번 주</div>
    <div class="week-row" id="week-mini"></div>
    <div class="sec-hd" style="margin-top:20px;display:flex;align-items:center;justify-content:space-between">
      <span>루틴 목록</span>
      <button onclick="openBuilder(null)" style="padding:5px 12px;border-radius:99px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation">+ 새 루틴</button>
    </div>
    <div id="routine-list"></div>
  </div>
</div>

<!-- ════ 운동 페이지 ════ -->
<div class="page" id="page-workout">
  <div class="wo-header">
    <div class="wo-top">
      <button class="back-btn" onclick="closeWorkout()">←</button>
      <div class="wo-name" id="wo-name">—</div>
    </div>
    <div class="wo-prog-bar"><div class="wo-prog-fill" id="wo-fill" style="width:0%"></div></div>
  </div>
  <div class="wo-body" id="wo-body"></div>
  <div class="fin-bar">
    <div class="fin-stat"><div class="fin-num" id="fin-done">0/0</div><div class="fin-label">운동</div></div>
    <div class="fin-stat"><div class="fin-num" id="fin-sets">0/0</div><div class="fin-label">세트</div></div>
    <div class="fin-stat"><div class="fin-num" id="fin-pct">0%</div><div class="fin-label">달성률</div></div>
    <button class="save-partial-btn" onclick="saveAndClose()">저장 후 종료</button>
    <button class="fin-btn" id="fin-btn" disabled onclick="finishWorkout()">완료</button>
  </div>
</div>

<!-- ════ 라이브러리 페이지 ════ -->
<div class="page" id="page-library">
  <div class="page-header" style="padding-bottom:0">
    <div class="page-title">운동 라이브러리</div>
    <!-- 루틴 선택 영역 -->
    <div id="lib-routine-select-wrap" style="margin-bottom:10px;margin-top:4px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">추가할 루틴 선택</div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="lib-routine-select" onchange="onLibRoutineSelect(this.value)"

        </select>
        <button onclick="openBuilderFromLib()" style="padding:9px 14px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation">+ 새 루틴</button>
      </div>
      <div id="lib-sub" style="font-size:12px;color:var(--muted);margin-top:6px">루틴을 선택하면 + 버튼으로 종목을 추가할 수 있습니다</div>

  </div>

</div>

<!-- ════ 히스토리 페이지 ════ -->
<div class="page" id="page-history">

  </div>
  <div class="hist-body" id="hist-body"></div>
</div>

<!-- 탭바 -->
<div class="tabbar">

// 스토리지 헬퍼
// ═══════════════════════════════════════════
function ld(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function getLibrary(){
  var saved=ld('wpl_library_custom',[]);
  return DEFAULT_LIBRARY.concat(saved);
}
function getCustomLibrary(){return ld('wpl_library_custom',[]);}
function saveCustomLibrary(arr){sv('wpl_library_custom',arr);}

function getRoutines(){return ld('wpl_routines',[]);}
function saveRoutines(arr){sv('wpl_routines',arr);}

function getLogs(){return ld('wpl_logs',{});}
function saveLogs(obj){sv('wpl_logs',obj);}

// ES5 호환 헬퍼
function pad2(n){return n<10?'0'+n:''+n;}
function dateKey(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function arrIncludes(arr,val){for(var i=0;i<arr.length;i++){if(arr[i]===val)return true;}return false;}
function strIncludes(str,q){return str.toLowerCase().indexOf(q)>=0;}
function arrFindIdx(arr,fn){for(var i=0;i<arr.length;i++){if(fn(arr[i],i))return i;}return -1;}
function arrFrom(len,fn){var r=[];for(var i=0;i<len;i++)r.push(fn(null,i));return r;}
function todayKey(){var d=new Date();return dateKey(d);}

// 탭 전환

function showTab(tab){
  currentTab=tab;
  ['home','library','history'].forEach(function(t){
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
    var btn=document.getElementById('tab-'+t);
    if(btn)btn.classList.toggle('active',t===tab);
  });
  if(tab==='home'){renderHome();}
  else if(tab==='library'){renderLibrary();}
  else if(tab==='history'){renderHistory();}
}

// ═══════════════════════════════════════════
// 홈 렌더
// ═══════════════════════════════════════════
function renderHome(){
  // 날짜
  var now=new Date();
  var days=['일','월','화','수','목','금','토'];
  document.getElementById('hd-date').textContent=
    now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+days[now.getDay()]+')';

  // 이번 주 미니
  var logs=getLogs();
  var week=document.getElementById('week-mini');
  var wDays=['일','월','화','수','목','금','토'];
  var monday=new Date(now);
  monday.setDate(now.getDate()-((now.getDay()+6)%7));
  var html='';
  for(var i=0;i<7;i++){
    var d=new Date(monday);d.setDate(monday.getDate()+i);
    var key=dateKey(d);
    var isToday=key===todayKey();
    var hasDone=logs[key]&&logs[key].length>0;
    var cls='wd-dot'+(hasDone?' done':'')+(isToday?' today':'');
    html+='<div class="week-day"><div class="wd-label">'+wDays[d.getDay()]+'</div>'+
      '<div class="'+cls+'">'+(hasDone?'✓':d.getDate())+'</div></div>';
  }
  week.innerHTML=html;

  // 스트릭
  var streak=0;
  var check=new Date(now);
  for(var n=0;n<365;n++){
    var k2=dateKey(check);
    if(logs[k2]&&logs[k2].length>0){streak++;check.setDate(check.getDate()-1);}
    else{break;}
  }
  document.getElementById('streak-badge').textContent='🔥 '+streak+'일 연속';

  // 루틴 목록
  var routines=getRoutines();
  var el=document.getElementById('routine-list');
  if(!routines.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">🏋️</div>'+
      '<div class="empty-title">루틴이 없습니다</div>'+
      '<div class="empty-desc">오른쪽 상단 <strong>+ 새 루틴</strong>을 눌러<br>첫 루틴을 만들어보세요.<br><br>라이브러리에서 운동을 골라<br>나만의 루틴을 구성할 수 있습니다.</div></div>';
    return;
  }
  var todayLogs=logs[todayKey()]||[];
  var doneIds=todayLogs.map(function(l){return l.routineId;});
  el.innerHTML=routines.map(function(r,idx){
    var isDone=doneIds.indexOf(r.id)>=0;
    var exNames=r.exercises.slice(0,3).map(function(e){return e.name;}).join(' · ')+(r.exercises.length>3?' +'+( r.exercises.length-3):'');
    var icons=['💪','🏃','🧘','⚡','🔥','🎯','💥','🌟'];
    var icon=r.icon||icons[idx%icons.length];
    return'<div class="r-card" style="animation-delay:'+(idx*0.04)+'s">'+
      '<div class="r-icon">'+icon+'</div>'+
      '<div class="r-body">'+
        '<div class="r-name">'+r.name+'</div>'+
        '<div class="r-desc">'+r.exercises.length+'개 종목 · '+exNames+'</div>'+
        '<div class="r-tags">'+
          (isDone?'<span class="tag tag-green">✓ 오늘 완료</span>':'<span class="tag tag-accent">'+r.exercises.length+'종목</span>')+
          '<span class="tag">'+getTotalSets(r)+'세트</span>'+
        '</div>'+
      '</div>'+
      '<div class="r-actions">'+
        '<button class="r-start-btn" onclick="startWorkout(\''+r.id+'\')">▶ 시작</button>'+
        '<button class="r-edit-btn" onclick="openBuilder(\''+r.id+'\')">편집</button>'+
        '<button class="r-del-btn" onclick="deleteRoutine(\''+r.id+'\')">삭제</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function getTotalSets(r){
  return r.exercises.reduce(function(sum,e){return sum+(e.sets||3);},0);
}

function deleteRoutine(id){
  if(!confirm('이 루틴을 삭제할까요?'))return;
  var r=getRoutines().filter(function(x){return x.id!==id;});
  saveRoutines(r);
  if(activeRoutineId===id)activeRoutineId=null;
  renderHome();
  showToast('루틴이 삭제되었습니다');
}

function openBuilder(rid){
  editingRoutineId=rid;
  if(rid){
    var r=getRoutines().find(function(x){return x.id===rid;});
    if(!r)return;
    document.getElementById('panel-title').textContent='루틴 편집';
    document.getElementById('routine-name-input').value=r.name;
    builderItems=JSON.parse(JSON.stringify(r.exercises));
    activeRoutineId=rid;
  } else {
    document.getElementById('panel-title').textContent='새 루틴 만들기';
    document.getElementById('routine-name-input').value='';
    builderItems=[];
    activeRoutineId='__new__';
  }
  renderPanelBody();
  document.getElementById('panel-overlay').style.display='block';
  var panel=document.getElementById('builder-panel');
  panel.style.display='flex';
  panel.style.flexDirection='column';
  updateLibRoutineSelect();
  updateLibSub();
}

function closePanel(){
  document.getElementById('panel-overlay').style.display='none';
  document.getElementById('builder-panel').style.display='none';
  if(currentTab==='library')renderLibrary();
}

function updateLibSub(){
  var sub=document.getElementById('lib-sub');
  if(!sub)return;
  if(activeRoutineId&&activeRoutineId!=='__new__'){
    var r=getRoutines().find(function(x){return x.id===activeRoutineId;});
    var name=r?r.name:'';
    var cnt=r?r.exercises.length:0;
    sub.textContent='✓ '+name+' ('+cnt+'종목) — + 버튼으로 추가';
    sub.style.color='var(--accent2)';
  } else if(activeRoutineId==='__new__'){
    var inp=document.getElementById('routine-name-input');
    var nm=inp&&inp.value?inp.value:'새 루틴';
    sub.textContent='새 루틴 "'+nm+'" 작성 중 — 저장 후 종목 추가 가능';
    sub.style.color='var(--orange)';
  } else {
    sub.textContent='위에서 루틴을 선택하면 + 버튼으로 종목을 추가할 수 있습니다';
    sub.style.color='var(--muted)';
  }
}

function addPanelCustom(){

function removeItem(i){builderItems.splice(i,1);renderPanelBody();}
function moveItem(i,dir){

  var tmp=builderItems[i];builderItems[i]=builderItems[ni];builderItems[ni]=tmp;
  renderPanelBody();
}
function adj(i,field,delta){
  var min=1,max=field==='sets'?10:(builderItems[i].repType==='time'?300:100);
  builderItems[i][field]=Math.max(min,Math.min(max,builderItems[i][field]+delta));

function saveRoutine(){
  var name=(document.getElementById('routine-name-input').value||'').trim();
  if(!name){showToast('루틴 이름을 입력해주세요');return;}
  if(!builderItems.length){showToast('운동을 최소 1개 추가해주세요');return;}
  var routines=getRoutines();
  var savedId;
  if(editingRoutineId&&editingRoutineId!=='__new__'){
    var idx=arrFindIdx(routines,function(r){return r.id===editingRoutineId;});
    if(idx>=0){
      routines[idx].name=name;
      routines[idx].exercises=JSON.parse(JSON.stringify(builderItems));
      savedId=editingRoutineId;
    }
  } else {
    savedId='r_'+Date.now();
    routines.push({id:savedId,name:name,exercises:JSON.parse(JSON.stringify(builderItems)),createdAt:Date.now()});
  }
  saveRoutines(routines);
  activeRoutineId=savedId;
  closePanel();
  builderItems=[];
  editingRoutineId=null;
  renderHome();
  updateLibRoutineSelect();
  showToast('루틴이 저장되었습니다 ✓');
}

// 라이브러리에서 루틴에 직접 추가/제거
// ═══════════════════════════════════════════
function toggleLibAdd(id){
  if(!activeRoutineId){
    showToast('위에서 루틴을 먼저 선택해주세요');
    return;
  }
  var lib=getLibrary();
  var ex=lib.find(function(x){return x.id===id;});
  if(!ex){showToast('운동 정보를 찾을 수 없습니다');return;}

  var routines=getRoutines();
  var rIdx=arrFindIdx(routines,function(r){return r.id===activeRoutineId;});
  if(rIdx<0){showToast('루틴을 찾을 수 없습니다');return;}

  var exIdx=arrFindIdx(routines[rIdx].exercises,function(e){return e.id===id;});
  if(exIdx>=0){
    // 이미 있으면 제거
    routines[rIdx].exercises.splice(exIdx,1);
    saveRoutines(routines);
    showToast(ex.name+' 제거됨');
  } else {
    // 없으면 추가
    routines[rIdx].exercises.push({id:ex.id,name:ex.name,cat:ex.cat,sets:3,reps:10,repType:'count'});
    saveRoutines(routines);
    showToast(ex.name+' — '+routines[rIdx].name+'에 추가됨 ✓');
  }
  renderLibrary();
  // 빌더 패널이 열려 있으면 동기화
  if(activeRoutineId&&document.getElementById('builder-panel').style.display==='flex'){
    var updated=getRoutines().find(function(r){return r.id===activeRoutineId;});
    if(updated)builderItems=JSON.parse(JSON.stringify(updated.exercises));
    renderPanelBody();
  }
}

function deleteLibItem(id){
  var cl=getCustomLibrary();
  var item=cl.find(function(x){return x.id===id;});
  if(!item)return;
  if(!confirm('"'+item.name+'"을 라이브러리에서 삭제할까요?'))return;
  saveCustomLibrary(cl.filter(function(x){return x.id!==id;}));
  renderLibrary();
  showToast('삭제되었습니다');
}

// ═══════════════════════════════════════════
// 운동 진행
// ═══════════════════════════════════════════
function startWorkout(rid){
  var r=getRoutines().find(function(x){return x.id===rid;});
  if(!r)return;
  workoutState={rid:rid,name:r.name,exercises:JSON.parse(JSON.stringify(r.exercises)),log:{},startTime:Date.now()};
  renderWorkout();
  ['home','library','history'].forEach(function(t){
    document.getElementById('page-'+t).classList.remove('active');
  });
  document.getElementById('page-workout').classList.add('active');
}

// 공통 기록 저장 함수 (중간/완료 공통)
function buildLogEntry(isPartial){
  if(!workoutState)return null;
  var exSummary=workoutState.exercises.map(function(ex,i){
    var doneSets=0;
    for(var s=0;s<ex.sets;s++){if(workoutState.log['e'+i+'_s'+s])doneSets++;}
    return{id:ex.id||'',name:ex.name,sets:ex.sets,doneSets:doneSets,reps:ex.reps,repType:ex.repType||'count'};
  });
  var totalSets=0,doneSets=0;
  exSummary.forEach(function(e){totalSets+=e.sets;doneSets+=e.doneSets;});
  var elapsed=Math.round((Date.now()-workoutState.startTime)/60000);
  return{
    routineId:workoutState.rid,
    routineName:workoutState.name,
    exercises:exSummary,
    totalSets:totalSets,
    doneSets:doneSets,
    pct:totalSets>0?Math.round(doneSets/totalSets*100):0,
    elapsed:elapsed,
    partial:isPartial||false,
    ts:Date.now()
  };
}

function commitLog(entry){
  if(!entry||entry.doneSets===0)return false;
  var logs=getLogs();
  var key=todayKey();
  if(!logs[key])logs[key]=[];
  // 같은 루틴 중복 저장 방지 - 오늘 같은 루틴 있으면 덮어씀
  var existIdx=arrFindIdx(logs[key],function(l){return l.routineId===entry.routineId&&l.ts===entry.ts;});
  if(existIdx>=0){logs[key][existIdx]=entry;}
  else{logs[key].push(entry);}
  saveLogs(logs);
  return true;
}

// 저장 후 종료 (중간 종료)
function saveAndClose(){
  if(!workoutState)return;
  var entry=buildLogEntry(true);
  if(entry&&entry.doneSets>0){
    commitLog(entry);
    showToast('수행한 '+entry.doneSets+'세트가 저장되었습니다');
  } else {
    showToast('저장할 세트 기록이 없습니다');
  }
  document.getElementById('page-workout').classList.remove('active');
  workoutState=null;
  stopTimer();
  showTab(currentTab||'home');
}

// 완전 종료
function closeWorkout(){
  // 세트가 하나라도 있으면 자동 저장 후 종료
  if(workoutState){
    var entry=buildLogEntry(true);
    if(entry&&entry.doneSets>0)commitLog(entry);
  }
  document.getElementById('page-workout').classList.remove('active');
  workoutState=null;
  stopTimer();
  showTab(currentTab||'home');
}

function finishWorkout(){
  if(!workoutState)return;
  var entry=buildLogEntry(false);
  if(entry)commitLog(entry);
  showToast('운동 완료! 수고하셨습니다 💪');
  setTimeout(function(){
    document.getElementById('page-workout').classList.remove('active');
    workoutState=null;
    stopTimer();
    showTab(currentTab||'home');
  },1200);
}

function wk(ei,si){return'e'+ei+'_s'+si;}
function toggleWSet(ei,si){
  if(!workoutState)return;
  var k=wk(ei,si);
  workoutState.log[k]=!workoutState.log[k];
  if(workoutState.log[k])startTimer();
  renderWorkout();
}
function toggleWEx(ei){
  if(!workoutState)return;
  var ex=workoutState.exercises[ei];
  var all=true;
  for(var s=0;s<ex.sets;s++){if(!workoutState.log[wk(ei,s)])all=false;}
  for(var s=0;s<ex.sets;s++){workoutState.log[wk(ei,s)]=!all;}
  renderWorkout();
}

// ── 운동 중 실시간 수정 ──
function woAdjSets(ei,delta){
  if(!workoutState)return;
  var ex=workoutState.exercises[ei];
  var newSets=Math.max(1,Math.min(10,(ex.sets||3)+delta));
  // 세트 줄일 때 해당 세트 로그 삭제
  if(newSets<ex.sets){
    for(var s=newSets;s<ex.sets;s++){delete workoutState.log[wk(ei,s)];}
  }
  workoutState.exercises[ei].sets=newSets;
  renderWorkout();
}
function woAdjReps(ei,delta){
  if(!workoutState)return;
  var ex=workoutState.exercises[ei];
  var max=ex.repType==='time'?300:100;
  workoutState.exercises[ei].reps=Math.max(1,Math.min(max,(ex.reps||10)+delta));
  renderWorkout();
}
function woDelEx(ei){
  if(!workoutState)return;
  // 해당 운동 로그 삭제 후 뒤 운동 로그 앞으로 당기기
  var totalEx=workoutState.exercises.length;
  for(var s=0;s<20;s++){delete workoutState.log[wk(ei,s)];}
  // 뒤 운동들 인덱스 앞당기기
  for(var i=ei+1;i<totalEx;i++){
    for(var s=0;s<20;s++){
      var val=workoutState.log[wk(i,s)];
      if(val!==undefined){workoutState.log[wk(i-1,s)]=val;}
      else{delete workoutState.log[wk(i-1,s)];}
    }
  }
  // 마지막 인덱스 로그 삭제
  for(var s=0;s<20;s++){delete workoutState.log[wk(totalEx-1,s)];}
  workoutState.exercises.splice(ei,1);
  renderWorkout();
}
function woAddEx(){
  if(!workoutState)return;
  var inp=document.getElementById('wo-add-input');
  var name=(inp.value||'').trim();
  if(!name){showToast('운동 이름을 입력해주세요');return;}
  // 라이브러리에서 매칭 시도
  var lib=getLibrary();
  var found=null;
  for(var i=0;i<lib.length;i++){
    if(lib[i].name===name){found=lib[i];break;}
  }
  var newEx=found?
    {id:found.id,name:found.name,cat:found.cat,sets:3,reps:10,repType:'count'}:
    {id:'cx_wo_'+Date.now(),name:name,cat:'기타',sets:3,reps:10,repType:'count'};
  workoutState.exercises.push(newEx);
  inp.value='';
  renderWorkout();
  showToast(name+' 추가됨');
}

function renderWorkout(){
  if(!workoutState)return;
  var exList=workoutState.exercises;
  var totalSets=0,doneSets=0,doneEx=0;
  exList.forEach(function(ex,i){
    totalSets+=ex.sets;var ed=true;
    for(var s=0;s<ex.sets;s++){if(workoutState.log[wk(i,s)])doneSets++;else ed=false;}

      '<svg width="12" height="12" viewBox="0 0 24 24" fill="#f87171"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.1c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.3v2c0 2.1.3 4.3.3 4.3s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.3 21.9 12 22 12 22s4.2 0 6.8-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.3v-2C23.3 9.1 23 7 23 7zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/></svg>'+
      '<span class="yt-text">영상</span></a>':'';
    var dots=arrFrom(ex.sets,function(_,s){
      var sd=workoutState.log[wk(i,s)]||false;
      return'<div class="set-dot'+(sd?' sd-done':'')+'" onclick="toggleWSet('+i+','+s+')">'+(s+1)+'</div>';
    }).join('');
    // 인라인 편집 바
    var editBar=
      '<div class="wo-edit-bar">'+
        '<span class="wo-adj-label">세트</span>'+
        '<div class="wo-adj-btn" onclick="woAdjSets('+i+',-1)">−</div>'+
        '<div class="wo-adj-val">'+ex.sets+'</div>'+
        '<div class="wo-adj-btn" onclick="woAdjSets('+i+',1)">+</div>'+
        '<span style="margin:0 6px;color:var(--border2)">|</span>'+
        '<span class="wo-adj-label">'+repUnit+'수</span>'+
        '<div class="wo-adj-btn" onclick="woAdjReps('+i+',-1)">−</div>'+
        '<div class="wo-adj-val">'+ex.reps+'</div>'+
        '<div class="wo-adj-btn" onclick="woAdjReps('+i+',1)">+</div>'+
        '<div class="wo-del-btn" onclick="woDelEx('+i+')">종목 삭제</div>'+
      '</div>';
    return'<div class="ex-card'+(done?' ex-done':'')+'">'+
      '<div class="ex-top">'+
        '<div class="ex-chk'+(done?' chk-done':'')+'" onclick="toggleWEx('+i+')">'+(done?'<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+
        '</div>'+
        '<div class="ex-info">'+
          '<div style="display:flex;align-items:flex-start;gap:6px">'+
            '<div class="ex-name">'+ex.name+'</div>'+ytHtml+
          '</div>'+
          '<div class="ex-meta-row"><span class="ex-meta-txt">'+ex.sets+'세트 · '+ex.reps+repUnit+'</span></div>'+
        '</div>'+
      '</div>'+
      '<div class="set-dots">'+dots+'</div>'+
      editBar+
    '</div>';
  }).join('');

  // 종목 추가 바
  bodyHtml+='<div class="wo-add-bar">'+
    '<input class="wo-add-input" id="wo-add-input" placeholder="종목 추가 (이름 입력)" maxlength="30" autocomplete="off">'+
    '<button class="wo-add-btn" onclick="woAddEx()">+ 추가</button>'+
  '</div>';

  document.getElementById('wo-body').innerHTML=bodyHtml;
}

function startTimer(){
  timerSec=0;
  document.getElementById('timer-overlay').style.display='flex';
  updateTimerDisplay();
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(function(){timerSec++;updateTimerDisplay();},1000);
}
function updateTimerDisplay(){
  var m=Math.floor(timerSec/60),s=timerSec%60;
  document.getElementById('timer-num').textContent=m+':'+(s<10?'0':'')+s;
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=null;
  document.getElementById('timer-overlay').style.display='none';
}
function cancelTimer(){stopTimer();}

function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.style.opacity='1';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.style.opacity='0';},2000);
}


// ═══════════════════════════════════════════
// 근육군 매핑 데이터
// ═══════════════════════════════════════════

  {id:'chest',  name:'가슴',   icon:'🫀', color:'#fb923c'},

  {id:'legs',   name:'하체',   icon:'🦵', color:'#f472b6'},
  {id:'core',   name:'코어',   icon:'⚡', color:'#6ee7b7'},
];
var MUSCLE_GOAL=10; // 주당 목표 세트

// 운동 ID → 근육군 매핑

// 커스텀 운동의 근육군 지정 저장
function getExMuscleMap(){return ld('wpl_ex_muscle',{});}
function saveExMuscleMap(m){sv('wpl_ex_muscle',m);}
function getMuscleForEx(exId){
  var custom=getExMuscleMap();
  return custom[exId]||EX_MUSCLE_MAP[exId]||null;
}
function setMuscleForEx(exId,muscleId){
  var m=getExMuscleMap();
  m[exId]=muscleId;
  saveExMuscleMap(m);
}

// 이번 주 월~일 날짜 범위
function getWeekRange(offset){
  offset=offset||0;
  var now=new Date();
  now.setDate(now.getDate()+offset*7);
  var mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));
  var sun=new Date(mon);
  sun.setDate(mon.getDate()+6);
  return{mon:mon,sun:sun};
}
function inWeekRange(dateStr,range){
  var d=new Date(dateStr);
  var m=new Date(range.mon);m.setHours(0,0,0,0);
  var s=new Date(range.sun);s.setHours(23,59,59,999);
  return d>=m&&d<=s;
}

// 주간 근육군별 세트 집계
function calcWeekMuscleSets(weekOffset){
  var logs=getLogs();
  var range=getWeekRange(weekOffset);
  var result={};
  MUSCLE_GROUPS.forEach(function(mg){result[mg.id]=0;});
  Object.keys(logs).forEach(function(dateStr){
    if(!inWeekRange(dateStr,range))return;
    logs[dateStr].forEach(function(entry){
      if(!entry.exercises)return;
      entry.exercises.forEach(function(ex){
        var mgId=getMuscleForEx(ex.id||'');
        if(mgId&&result[mgId]!==undefined){
          result[mgId]+=ex.doneSets||0;
        }
      });
    });
  });
  return result;
}

// ═══════════════════════════════════════════
// 히스토리 탭 전환
// ═══════════════════════════════════════════
var histTab='muscle';
var weekOffset=0;

function renderHistory(){
  var logs=getLogs();
  var streak=0,now=new Date(),check=new Date();
  for(var n=0;n<365;n++){
    var k=dateKey(check);
    if(logs[k]&&logs[k].length>0){streak++;check.setDate(check.getDate()-1);}else break;
  }
  var sub=document.getElementById('hist-streak-sub');
  if(sub)sub.textContent=streak?'🔥 '+streak+'일 연속 운동 중':'아직 기록이 없습니다';
  renderHistBody();
}

function switchHistTab(tab){
  histTab=tab;
  document.getElementById('htab-muscle').className='hist-tab'+(tab==='muscle'?' ht-active':'');
  document.getElementById('htab-log').className='hist-tab'+(tab==='log'?' ht-active':'');
  renderHistBody();
}

function renderHistBody(){
  if(histTab==='muscle') renderMuscleDashboard();
  else renderHistLog();
}

// ═══════════════════════════════════════════
// 근육군 대시보드
// ═══════════════════════════════════════════
function renderMuscleDashboard(){
  var sets=calcWeekMuscleSets(weekOffset);
  var range=getWeekRange(weekOffset);
  var monStr=(range.mon.getMonth()+1)+'/'+range.mon.getDate();
  var sunStr=(range.sun.getMonth()+1)+'/'+range.sun.getDate();
  var isThisWeek=weekOffset===0;
  var weekLabel=isThisWeek?'이번 주 ('+monStr+'~'+sunStr+')':(weekOffset===-1?'지난 주':''+monStr+'~'+sunStr);

  // 부족 근육군
  var short=MUSCLE_GROUPS.filter(function(mg){return sets[mg.id]<MUSCLE_GOAL;});
  var done=MUSCLE_GROUPS.filter(function(mg){return sets[mg.id]>=MUSCLE_GOAL;});

  var html='<div class="muscle-dashboard">';
  html+='<div class="md-header">';
  html+='<div class="md-title">💪 근육군별 주간 세트</div>';
  html+='<div class="md-week-nav">';
  html+='<div class="wn-btn" onclick="changeWeek(-1)">‹</div>';
  html+='<div class="md-week">'+weekLabel+'</div>';
  html+='<div class="wn-btn" onclick="changeWeek(1)"'+(weekOffset>=0?' style="opacity:0.3;pointer-events:none"':'')+'>›</div>';
  html+='</div></div>';
  html+='<div class="md-goal-note">목표: 각 근육군 주당 <strong style="color:var(--accent2)">'+MUSCLE_GOAL+'세트</strong> 이상 · '+done.length+'/'+MUSCLE_GROUPS.length+' 달성</div>';

  MUSCLE_GROUPS.forEach(function(mg){
    var cnt=sets[mg.id]||0;
    var pct=Math.min(100,Math.round(cnt/MUSCLE_GOAL*100));
    var cls=cnt>=MUSCLE_GOAL?'mg-ok':cnt>0?'mg-low':'mg-none';
    var barCls=cnt>=MUSCLE_GOAL?'mf-ok':cnt>=MUSCLE_GOAL/2?'mf-mid':'mf-low';
    if(cnt===0)barCls='mf-none';
    html+='<div class="mg-row">';
    html+='<div class="mg-top">';
    html+='<div class="mg-name">'+mg.icon+' '+mg.name+'</div>';
    html+='<div class="mg-count '+cls+'">'+cnt+' / '+MUSCLE_GOAL+' 세트'+(cnt>=MUSCLE_GOAL?' ✓':'')+'</div>';
    html+='</div>';
    html+='<div class="mg-bar-wrap"><div class="mg-bar-fill '+barCls+'" style="width:'+pct+'%"></div></div>';
    html+='</div>';
  });

  if(short.length&&isThisWeek){
    html+='<div class="mg-alert-row">';
    html+='<div style="font-size:10px;font-weight:700;color:var(--orange);align-self:center;flex-shrink:0">부족 :</div>';
    short.forEach(function(mg){
      var need=MUSCLE_GOAL-(sets[mg.id]||0);
      html+='<div class="mg-alert-chip">'+mg.icon+' '+mg.name+' '+need+'세트 더</div>';
    });
    html+='</div>';
  }
  html+='</div>';

  // 미분류 운동 감지 (이번 주 기록에서)
  var logs=getLogs();
  var range2=getWeekRange(weekOffset);
  var untaggedExs={};
  Object.keys(logs).forEach(function(dateStr){
    if(!inWeekRange(dateStr,range2))return;
    logs[dateStr].forEach(function(entry){
      if(!entry.exercises)return;
      entry.exercises.forEach(function(ex){
        if(ex.id&&!getMuscleForEx(ex.id)&&ex.doneSets>0){
          untaggedExs[ex.id]=ex.name;
        }
      });
    });
  });
  var untaggedKeys=Object.keys(untaggedExs);
  if(untaggedKeys.length){
    html+='<div class="muscle-tag-panel">';
    html+='<div class="mtp-title">⚠ 근육군 미지정 종목 — 탭해서 지정하세요</div>';
    untaggedKeys.forEach(function(exId){
      html+='<div style="margin-bottom:10px">';
      html+='<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">'+untaggedExs[exId]+'</div>';
      html+='<div class="mtp-chips">';
      MUSCLE_GROUPS.forEach(function(mg){
        var cur=getMuscleForEx(exId);
        html+='<div class="mtp-chip'+(cur===mg.id?' selected':'')+' onclick="assignMuscle('+JSON.stringify(exId)+','+JSON.stringify(mg.id)+')">'+mg.icon+' '+mg.name+'</div>';
      });
      html+='</div></div>';
    });
    html+='</div>';
  }

  document.getElementById('hist-body').innerHTML=html;
}

function changeWeek(dir){
  weekOffset+=dir;
  if(weekOffset>0)weekOffset=0;
  renderMuscleDashboard();
}


function assignMuscle(exId,muscleId){
  var cur=getMuscleForEx(exId);
  if(cur===muscleId){
    // 토글: 같은 걸 누르면 해제
    var m=getExMuscleMap();
    delete m[exId];
    saveExMuscleMap(m);
  } else {
    setMuscleForEx(exId,muscleId);
  }
  renderMuscleDashboard();
  showToast('근육군 지정됨 ✓');
}

// ═══════════════════════════════════════════
// 기존 기록 보기 (renderHistory에서 분리)
// ═══════════════════════════════════════════
function renderHistLog(){
  var logs=getLogs();
  var allKeys=Object.keys(logs).sort().reverse();
  if(!allKeys.length){
    document.getElementById('hist-body').innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">기록이 없습니다</div><div class="empty-desc">운동을 완료하면<br>여기에 기록이 쌓입니다.</div></div>';
    return;
  }
  var now=new Date();
  var html='<div class="month-label">'+now.getFullYear()+'년 '+(now.getMonth()+1)+'월</div>';
  html+='<div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(function(d){html+='<div class="cal-day-hd">'+d+'</div>';});
  var first=new Date(now.getFullYear(),now.getMonth(),1);
  var last=new Date(now.getFullYear(),now.getMonth()+1,0);
  for(var i=0;i<first.getDay();i++)html+='<div class="cal-cell empty"></div>';
  for(var d2=1;d2<=last.getDate();d2++){
    var ck=now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(d2);
    var has=logs[ck]&&logs[ck].length>0;
    var isToday=ck===todayKey();
    var cellCls='cal-cell'+(has?' has-log':'')+(isToday?' is-today':'');
    var cellAttr=has?' data-ck="'+ck+'" onclick="scrollToDate(this.dataset.ck)"':'';
    html+='<div class="'+cellCls+'"'+cellAttr+'><div class="cal-num">'+d2+'</div>'+(has?'<div class="cal-dot"></div>':'')+'</div>';
  }
  html+='</div>';
  html+='<div class="sec-hd">전체 기록</div>';
  allKeys.forEach(function(key){
    var entries=logs[key];
    var dateObj=new Date(key);
    var dateStr=dateObj.getFullYear()+'년 '+(dateObj.getMonth()+1)+'월 '+dateObj.getDate()+'일';
    entries.forEach(function(entry){
      var exList=entry.exercises?entry.exercises.slice(0,5).map(function(e){return e.name+(e.doneSets<e.sets?' ('+e.doneSets+'/'+e.sets+')':'');}).join(', '):'';
      if(entry.exercises&&entry.exercises.length>5)exList+=' 외 '+(entry.exercises.length-5)+'개';
      html+='<div class="hist-entry" id="log-'+key+'">'+
        '<div class="he-date">'+dateStr+(entry.elapsed?' · '+entry.elapsed+'분':'')+'</div>'+
        '<div class="he-name">'+entry.routineName+'</div>'+
        '<div class="he-tags"><span class="tag tag-accent">'+entry.pct+'% 달성</span><span class="tag tag-green">'+entry.doneSets+'/'+entry.totalSets+' 세트</span></div>'+
        (exList?'<div class="he-exlist">'+exList+'</div>':'')+
      '</div>';
    });
  });
  document.getElementById('hist-body').innerHTML=html;
}

function scrollToDate(key){
  var el=document.getElementById('log-'+key);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}
